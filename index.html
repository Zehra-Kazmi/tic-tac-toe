<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - New Game Modes</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* --- GAME BOARD --- */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            background-color: white;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .cell:hover {
            background-color: #f9f9f9;
        }

        .cell.x {
            color: blue;
        }
        .cell.o {
            color: red;
        }

        /* --- UI ELEMENTS --- */
        .status {
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* --- MENU OVERLAY --- */
        #game-menu {
            display: flex; /* Flex to center items */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute; /* To sit on top of other elements if needed */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 10; /* Ensure it's on top */
        }

        /* Utility class to hide elements */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. The Main Menu -->
    <div id="game-menu">
        <h1>Welcome to Tic Tac Toe</h1>
        <p>Choose your game mode:</p>
        <button id="solo-btn" onclick="startGame('solo')">Play Solo (vs Bot)</button>
        <button id="players-btn" onclick="startGame('players')">Play with a Friend</button>
    </div>

    <!-- 2. The Game Area (Initially Hidden) -->
    <div id="game-container" class="hidden">
        <h1>Tic Tac Toe</h1>
        <div class="status" id="status">Player X's Turn</div>
        <div class="board" id="board">
            <!-- Cells will be generated by JavaScript -->
        </div>
        <button id="reset-btn" onclick="resetGame()">Restart Game</button>
        <button id="menu-btn" onclick="showMenu()">Back to Menu</button>
    </div>

    <script>
        // --- GAME VARIABLES ---
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const gameMenu = document.getElementById('game-menu');
        const gameContainer = document.getElementById('game-container');
        
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let gameMode = 'players'; // Can be 'solo' or 'players'
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // --- INITIALIZATION ---
        function initBoard() {
            boardElement.innerHTML = '';
            boardState.forEach((cell, index) => {
                const cellElement = document.createElement('div');
                cellElement.classList.add('cell');
                cellElement.dataset.index = index;
                cellElement.addEventListener('click', handleCellClick);
                boardElement.appendChild(cellElement);
            });
        }

        // --- START GAME / MENU FUNCTIONS ---
        function startGame(mode) {
            gameMode = mode;
            gameMenu.classList.add('hidden'); // Hide the menu
            gameContainer.classList.remove('hidden'); // Show the game
            resetGame();
        }

        function showMenu() {
            gameMenu.classList.remove('hidden'); // Show the menu
            gameContainer.classList.add('hidden'); // Hide the game
        }

        function resetGame() {
            boardState = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            statusElement.textContent = `Player ${currentPlayer}'s Turn`;
            initBoard();
        }

        // --- CORE GAMEPLAY LOGIC ---
        function handleCellClick(event) {
            const clickedCell = event.target;
            const clickedCellIndex = parseInt(clickedCell.dataset.index);

            // Check if cell is already filled or game is over
            if (boardState[clickedCellIndex] !== '' || !gameActive) {
                return;
            }

            // Make the player's move
            updateCell(clickedCell, clickedCellIndex);
            checkResult();

            // If game is still active, it's the next player's turn
            if (gameActive) {
                // If it's solo mode and the next player is O (the bot)
                if (gameMode === 'solo' && currentPlayer === 'O') {
                    statusElement.textContent = "Bot is thinking...";
                    // Add a short delay for a more natural feel
                    setTimeout(botMove, 500);
                } else {
                    statusElement.textContent = `Player ${currentPlayer}'s Turn`;
                }
            }
        }

        function updateCell(cell, index) {
            boardState[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        // --- BOT LOGIC ---
        function botMove() {
            // Find all available empty cells
            const emptyCells = [];
            boardState.forEach((cell, index) => {
                if (cell === '') {
                    emptyCells.push(index);
                }
            });

            // If there are empty cells, pick a random one
            if (emptyCells.length > 0) {
                const randomIndex = Math.floor(Math.random() * emptyCells.length);
                const cellToPlayIndex = emptyCells[randomIndex];
                
                // Find the actual DOM element for that index
                const cellElement = document.querySelector(`.cell[data-index='${cellToPlayIndex}']`);
                
                updateCell(cellElement, cellToPlayIndex);
                checkResult();

                if (gameActive) {
                    statusElement.textContent = `Player ${currentPlayer}'s Turn`;
                }
            }
        }

        // --- WIN/LOSE/DRAW LOGIC ---
        function checkResult() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusElement.textContent = `Player ${currentPlayer} Wins!`;
                gameActive = false;
                return;
            }

            if (!boardState.includes('')) {
                statusElement.textContent = "It's a Draw!";
                gameActive = false;
                return;
            }

            switchPlayer();
        }
    </script>
</body>
</html>
