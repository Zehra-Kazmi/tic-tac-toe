<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        /* CSS Variables for easy theming */
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --board-bg: #16213e;
            --cell-bg: #0f3460;
            --cell-hover: #1a4b85;
            --border-radius: 10px;
            --x-color: #ff2e63;
            --o-color: #08d9d6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Status Display */
        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 1.5em;
            font-weight: bold;
            text-align: center;
        }

        .current-player {
            color: var(--o-color);
        }

        /* Game Board Grid */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 10px;
            background-color: var(--board-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: var(--cell-bg);
            border: none;
            border-radius: 5px;
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        /* Interactive states */
        .cell:hover:not(:disabled) {
            background-color: var(--cell-hover);
        }

        .cell:active:not(:disabled) {
            transform: scale(0.95);
        }

        /* Specific colors for X and O */
        .cell.x {
            color: var(--x-color);
        }

        .cell.o {
            color: var(--o-color);
        }

        /* Winning cells highlight */
        .cell.win {
            background-color: #2ecc71 !important;
            color: white !important;
        }

        /* Controls */
        .controls {
            margin-top: 25px;
        }

        .restart-btn {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--text-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .restart-btn:hover {
            opacity: 0.9;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        /* Responsive Design */
        @media (max-width: 400px) {
            .cell {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tic Tac Toe</h1>
    </header>

    <main>
        <div class="status" id="statusMessage">Player <span class="current-player">X</span>'s turn</div>

        <div class="game-board" id="board">
            <button class="cell" data-index="0" aria-label="Cell 0"></button>
            <button class="cell" data-index="1" aria-label="Cell 1"></button>
            <button class="cell" data-index="2" aria-label="Cell 2"></button>
            <button class="cell" data-index="3" aria-label="Cell 3"></button>
            <button class="cell" data-index="4" aria-label="Cell 4"></button>
            <button class="cell" data-index="5" aria-label="Cell 5"></button>
            <button class="cell" data-index="6" aria-label="Cell 6"></button>
            <button class="cell" data-index="7" aria-label="Cell 7"></button>
            <button class="cell" data-index="8" aria-label="Cell 8"></button>
        </div>

        <div class="controls">
            <button class="restart-btn" id="restartBtn">Play Again</button>
        </div>
    </main>

    <script>
        /**
         * TIC TAC TOE GAME LOGIC WITH AUTO-SELECT BOT
         */

        // State Variables
        let gameState = ["", "", "", "", "", "", "", "", ""]; 
        let currentPlayer = "X"; 
        let isGameActive = true; 

        // DOM Elements
        const statusDisplay = document.getElementById('statusMessage');
        const cells = document.querySelectorAll('.cell');
        const restartBtn = document.getElementById('restartBtn');

        // Winning Combinations
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // Messages
        const winningMessage = () => `Player <span class="current-player" style="color: ${currentPlayer === 'X' ? 'var(--x-color)' : 'var(--o-color)'}">${currentPlayer}</span> has won!`;
        const drawMessage = () => `Game ended in a draw!`;
        const currentPlayerTurn = () => `Player <span class="current-player" style="color: ${currentPlayer === 'X' ? 'var(--x-color)' : 'var(--o-color)'}">${currentPlayer}</span>'s turn`;

        statusDisplay.innerHTML = currentPlayerTurn();

        function handleCellPlayed(clickedCell, clickedCellIndex) {
            gameState[clickedCellIndex] = currentPlayer;
            clickedCell.innerText = currentPlayer;
            clickedCell.classList.add(currentPlayer.toLowerCase());
        }

        function handlePlayerChange() {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusDisplay.innerHTML = currentPlayerTurn();

            // 👉 IF IT IS PLAYER O's TURN, THE BOT PLAYS AUTOMATICALLY
            if (currentPlayer === "O" && isGameActive) {
                // Temporarily disable board while bot thinks slightly (looks realistic)
                cells.forEach(cell => cell.disabled = true);
                setTimeout(makeBotMove, 500); 
            }
        }

        /**
         * 🤖 Auto-Select Bot Logic
         */
        function makeBotMove() {
            if (!isGameActive) return;

            // 1. Find all available empty indexes
            let availableCells = [];
            gameState.forEach((cell, index) => {
                if (cell === "") {
                    availableCells.push(index);
                }
            });

            // 2. If spots exist, pick a random index
            if (availableCells.length > 0) {
                const randomIndex = availableCells[Math.floor(Math.random() * availableCells.length)];
                const targetCell = cells[randomIndex];

                // 3. Play the Bot's move
                handleCellPlayed(targetCell, randomIndex);
                
                // Re-enable remaining empty cells for the human player
                cells.forEach((cell, idx) => {
                    if (gameState[idx] === "") cell.disabled = false;
                });

                handleResultValidation();
            }
        }

        function handleResultValidation() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i <= 7; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];

                if (a === '' || b === '' || c === '') continue;

                if (a === b && b === c) {
                    roundWon = true;
                    winningLine = winCondition;
                    break;
                }
            }

            if (roundWon) {
                statusDisplay.innerHTML = winningMessage();
                isGameActive = false;
                highlightWinningCells(winningLine);
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusDisplay.innerHTML = drawMessage();
                isGameActive = false;
                return;
            }

            handlePlayerChange();
        }

        function highlightWinningCells(indices) {
            indices.forEach(index => cells[index].classList.add('win'));
            cells.forEach(cell => cell.disabled = true);
        }

        function handleCellClick(clickedCellEvent) {
            const clickedCell = clickedCellEvent.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            // Prevent clicking if cell is full, game is over, or if it's the Bot's turn (O)
            if (gameState[clickedCellIndex] !== "" || !isGameActive || currentPlayer === "O") {
                return;
            }

            handleCellPlayed(clickedCell, clickedCellIndex);
            handleResultValidation();
        }

        function handleRestartGame() {
            isGameActive = true;
            currentPlayer = "X";
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusDisplay.innerHTML = currentPlayerTurn();
            
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o', 'win');
                cell.disabled = false;
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        restartBtn.addEventListener('click', handleRestartGame);
    </script>
</body>
</html>
