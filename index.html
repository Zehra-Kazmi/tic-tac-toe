<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe vs Bot</title>
    <style>
        /* CSS Variables for easy theming */
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --board-bg: #16213e;
            --cell-bg: #0f3460;
            --cell-hover: #1a4b85;
            --border-radius: 10px;
            --x-color: #ff2e63;
            --o-color: #08d9d6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        /* Status Display */
        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 1.5em;
            font-weight: bold;
            text-align: center;
        }

        /* Game Board Grid */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 10px;
            background-color: var(--board-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Overlay to prevent clicking while bot thinks */
        .board-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            z-index: 10;
            display: none; /* Hidden by default */
            cursor: wait;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: var(--cell-bg);
            border: none;
            border-radius: 5px;
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .cell:hover:not(:disabled) {
            background-color: var(--cell-hover);
        }

        /* Specific colors for X and O */
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        /* Winning cells highlight */
        .cell.win {
            background-color: #2ecc71 !important;
            color: white !important;
        }

        /* Controls */
        .controls {
            margin-top: 25px;
        }

        .restart-btn {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--text-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .restart-btn:hover { opacity: 0.9; }
        .restart-btn:active { transform: scale(0.95); }

        /* Responsive Design */
        @media (max-width: 400px) {
            .cell { width: 80px; height: 80px; font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tic Tac Toe</h1>
        <div class="subtitle">Player (X) vs Smart Bot (O)</div>
    </header>

    <main>
        <div class="status" id="statusMessage">Your Turn (X)</div>

        <div class="game-board" id="board">
            <div class="board-overlay" id="boardOverlay"></div>
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="controls">
            <button class="restart-btn" id="restartBtn">Play Again</button>
        </div>
    </main>

    <script>
        /**
         * TIC TAC TOE VS BOT (Minimax Algorithm)
         */

        // State Variables
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let isGameActive = true;
        
        // Player is always X, Bot is always O
        const HUMAN = 'X';
        const BOT = 'O';

        // DOM Elements
        const statusDisplay = document.getElementById('statusMessage');
        const cells = document.querySelectorAll('.cell');
        const restartBtn = document.getElementById('restartBtn');
        const boardOverlay = document.getElementById('boardOverlay');

        // Winning Combinations
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // --- GAME LOGIC ---

        function handleCellPlayed(clickedCell, clickedCellIndex, player) {
            gameState[clickedCellIndex] = player;
            clickedCell.innerText = player;
            clickedCell.classList.add(player.toLowerCase());
        }

        function handleResultValidation() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i <= 7; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];

                if (a === '' || b === '' || c === '') continue;
                if (a === b && b === c) {
                    roundWon = true;
                    winningLine = winCondition;
                    break;
                }
            }

            if (roundWon) {
                // Determine who won based on the last move (simply checking current state)
                // Since we check after every move, we look at the winning line content
                const winner = gameState[winningLine[0]];
                announceWinner(winner, winningLine);
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusDisplay.innerText = "Game ended in a Draw!";
                isGameActive = false;
                boardOverlay.style.display = 'none';
                return;
            }
        }

        function announceWinner(winner, line) {
            isGameActive = false;
            statusDisplay.innerHTML = winner === HUMAN 
                ? `<span style="color:var(--x-color)">You Won!</span>` 
                : `<span style="color:var(--o-color)">Bot Won!</span>`;
            
            // Highlight winning cells
            line.forEach(index => cells[index].classList.add('win'));
            boardOverlay.style.display = 'none';
        }

        // --- BOT LOGIC (MINIMAX) ---

        function handleBotTurn() {
            if (!isGameActive) return;

            // 1. Lock the board so user can't click while bot "thinks"
            boardOverlay.style.display = 'block';
            statusDisplay.innerText = "Bot is thinking...";

            // 2. Delay slightly for realism
            setTimeout(() => {
                const bestMoveIndex = minimax(gameState, BOT).index;
                
                const cell = document.querySelector(`[data-index='${bestMoveIndex}']`);
                handleCellPlayed(cell, bestMoveIndex, BOT);
                handleResultValidation();

                // 3. Unlock board if game is still active
                if(isGameActive) {
                    statusDisplay.innerText = "Your Turn (X)";
                    boardOverlay.style.display = 'none';
                }
            }, 600); // 600ms delay
        }

        // Minimax Algorithm - The Brain of the Bot
        function minimax(newBoard, player) {
            // Find indices of available spots
            const availSpots = newBoard.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);

            // Checks for terminal states (Win/Loss/Draw)
            if (checkWin(newBoard, HUMAN)) return { score: -10 };
            if (checkWin(newBoard, BOT)) return { score: 10 };
            if (availSpots.length === 0) return { score: 0 };

            // Array to collect moves and their scores
            const moves = [];

            // Loop through available spots
            for (let i = 0; i < availSpots.length; i++) {
                const move = {};
                move.index = availSpots[i];

                // Make the move on the temp board
                newBoard[availSpots[i]] = player;

                // Recursive call: Minimax for the opposite player
                if (player === BOT) {
                    const result = minimax(newBoard, HUMAN);
                    move.score = result.score;
                } else {
                    const result = minimax(newBoard, BOT);
                    move.score = result.score;
                }

                // Undo the move (backtrack)
                newBoard[availSpots[i]] = "";

                moves.push(move);
            }

            // Choose best move
            let bestMove;
            if (player === BOT) {
                // Bot wants highest score (10)
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                // Human wants lowest score (-10)
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }

            return moves[bestMove];
        }

        // Helper to check win state purely for Minimax logic
        function checkWin(board, player) {
            return winningConditions.some(combination => {
                return combination.every(index => {
                    return board[index] === player;
                });
            });
        }

        // --- EVENT HANDLERS ---

        function handleCellClick(clickedCellEvent) {
            const clickedCell = clickedCellEvent.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            // Validation: cell empty? game active? is it player's turn?
            if (gameState[clickedCellIndex] !== "" || !isGameActive || boardOverlay.style.display === 'block') {
                return;
            }

            // 1. Player Move
            handleCellPlayed(clickedCell, clickedCellIndex, HUMAN);
            handleResultValidation();

            // 2. If game continues, trigger Bot
            if (isGameActive) {
                handleBotTurn();
            }
        }

        function handleRestartGame() {
            isGameActive = true;
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusDisplay.innerText = "Your Turn (X)";
            boardOverlay.style.display = 'none';
            
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o', 'win');
            });
        }

        // Listeners
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        restartBtn.addEventListener('click', handleRestartGame);

    </script>
</body>
</html>
